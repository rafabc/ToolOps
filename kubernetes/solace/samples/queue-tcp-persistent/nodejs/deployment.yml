# --- DEPLOYMENT DEL PRODUCER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-queue-garanted-tcp-smf
  namespace: solace
  labels:
    app: producer-queue-garanted-tcp-smf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer-queue-garanted-tcp-smf
  template:
    metadata:
      labels:
        app: producer-queue-garanted-tcp-smf
    spec:
      containers:
      - name: producer
        image: producer-queue-garanted-tcp-smf:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: SOLACE_URL
            value: "tcp://solace.solace.svc.cluster.local:55555"
          - name: SEMP_URL
            value: "solace.solace.svc.cluster.local"
          - name: SEMP_PORT
            value: "8080"
          - name: SEMP_USER
            value: "admin"
          - name: SEMP_PASSWORD
            value: ""
          - name: BROKER_USER
            value: "admin"
          - name: BROKER_PASSWORD
            value: ""
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
# --- DEPLOYMENT DEL CONSUMER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-queue-garanted-tcp-smf
  namespace: solace
  labels:
    app: consumer-queue-garanted-tcp-smf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-queue-garanted-tcp-smf
  template:
    metadata:
      labels:
        app: consumer-queue-garanted-tcp-smf
    spec:
      containers:
      - name: consumer
        image: consumer-queue-garanted-tcp-smf:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: SOLACE_URL
            value: "tcp://solace.solace.svc.cluster.local:55555"
        ports:
        - containerPort: 8081 # Cambiado para evitar confusiones, aunque al ser pods distintos podrían repetir
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"