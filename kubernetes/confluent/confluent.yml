
apiVersion: v1
kind: Secret
metadata:
  name: confluent-registry
  namespace: confluent
type: kubernetes.io/dockerconfigjson
data:
  # Este es un valor dummy codificado en base64 para {"auths":{}}
  # OK al operador sin necesidad de credenciales reales
  .dockerconfigjson: eyJhdXRocyI6e319
---
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  dataVolumeCapacity: 10G
  storageClass:
    name: hostpath
  image:
    application: docker.io/confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:2.8.0
  replicas: 1
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 3
  image:
    application: confluentinc/cp-server:8.1.2
    init: confluentinc/confluent-init-container:2.8.0
  dataVolumeCapacity: 10Gi
  # resources:
  #     requests:
  #       cpu: 1000m
  #       memory: 3Gi
  #     limits:
  #       cpu: 1000m
  #       memory: 3Gi
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
