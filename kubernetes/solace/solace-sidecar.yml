apiVersion: v1
kind: ConfigMap
metadata:
  name: ema-config
  namespace: solace
data:
  ema.yml: |
    solace:
      maas:
        plugins:
          kafka:
            enabled: false
            client:
              timeout:
                value: 60
                unit: SECONDS
          confluent:
            enabled: false
# ---
