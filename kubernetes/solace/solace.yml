apiVersion: apps/v1
kind: Deployment
metadata:
  name: solace-discovery-agent
  namespace: solace
  labels:
    app: discovery-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-agent
  template:
    metadata:
      labels:
        app: discovery-agent
    spec:
      containers:
      - name: discovery-agent
        image: solace/event-management-agent:1.9.7
        env:
          - name: SOLACE_CLOUD_TOKEN
            value: "eyJhbGciOiJSUzI1NiIsImtpZCI6Im1hYXNfcHJvZF8yMDIwMDMyNiIsInR5cCI6IkpXVCJ9..Vsm3k9dNSn-VbQrLWeIPWctbQ_TAQrKv2Foh3qNfJa-WkckgYMtTrOSYa0rOB8M2GwkC3_7q6wN9j7Wm58Hr1f8f-jleJ2dlzNyHJ3o510uxAmxhWzNii7vs92vxEWn8goA5CaektB8BHw8EvPSiXYxpHqI-9RX8bG7evOh_ErS_3bgQmFYZCzhGjb6cs7yCS4B3d8VX3dMY5vsc9vJgl9LRBo0fcWtvfVTm6ongg37sj3Zkt1VNcO-kD0MZaaeyxbemxFfVehc5VQWHZO0kOvm9EzTFyU7Ebjz613zPWF-5COM9-XRHXTGapRKHxDMCLREJjpcFDxvdz09dsNZ5vA"
          # - name: SOLACE_CLOUD_URL
          #   value: "https://console.solace.cloud"
          - name: AGENT_NAME
            value: "K8s-Standalone-Agent"
          # DESACTIVA EL PLUGIN DE KAFKA QUE DA EL ERROR
          - name: SOLACE_MAAS_PLUGINS_KAFKA_ENABLED
            value: "false"
          # OPCIONAL: DESACTIVA OTROS SI NO LOS USAS
          - name: SOLACE_MAAS_PLUGINS_CONFLUENT_ENABLED
            value: "false"
          - name: SOLACE_MAAS_PLUGINS_KAFKA_CLIENT_TIMEOUT_VALUE
            value: "60"
          - name: SOLACE_MAAS_PLUGINS_KAFKA_CLIENT_TIMEOUT_UNIT
            value: "SECONDS"
          # - name: SPRING_PROFILES_ACTIVE
          #   value: "solace"
          - name: AGENT_NAME
            value: "K8s-Standalone-Agent"
          - name: LOGGING_LEVEL_ROOT
            value: "INFO"
          - name: LOGGING_LEVEL_COM_SOLACE
            value: "INFO"
          - name: LOGGING_LEVEL_COM_SOLACESYSTEMS
            value: "INFO"
          # - name: JAVA_OPTS
          #   value: >-
          #     -Djavax.net.ssl.trustStore=/etc/ssl/certs/solace.crt
          #     -Djavax.net.ssl.trustStoreType=PEM
          #     -Dsolace.messaging.transport.ssl.trust-store-path=/etc/ssl/certs/solace.crt
          #     -Dsolace.messaging.transport.ssl.trust-store-format=PEM
          #     -Dsolace.messaging.transport.ssl.validate-certificate=false
          #     -Dsolace.eventportal.gateway.messaging.connections.0.ssl.truststore=/etc/ssl/certs/solace.crt
          #     -Dsolace.eventportal.gateway.messaging.connections.0.ssl.truststoretype=PEM
          #     -Dsolace.eventportal.gateway.messaging.connections.0.ssl.truststoreformat=PEM
          #     -Dsolace.eventportal.gateway.messaging.connections.0.ssl.validatecertificate=false
          #     -Dsolace.cloud.ssl.trust-store=/etc/ssl/certs/solace.crt
          #     -Dsolace.cloud.ssl.validate-certificate=false
          #     -Dsolace.cloud.ssl.trust-store-format=PEM
          #     -Dspring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true 

          # 2. Configuración específica para el Gateway del Event Portal
          - name: SOLACE_EVENTPORTAL_GATEWAY_MESSAGING_CONNECTIONS_0_SSL_TRUSTSTORE
            value: "/etc/ssl/certs/solace.crt"
          - name: SOLACE_EVENTPORTAL_GATEWAY_MESSAGING_CONNECTIONS_0_SSL_TRUSTSTORETYPE
            value: "PEM"
          - name: SOLACE_EVENTPORTAL_GATEWAY_MESSAGING_CONNECTIONS_0_SSL_TRUSTSTOREFORMAT
            value: "PEM"
          # Intenta poner esto en false explícitamente para ver si el error desaparece
          - name: SOLACE_EVENTPORTAL_GATEWAY_MESSAGING_CONNECTIONS_0_SSL_VALIDATECERTIFICATE
            value: "false"
          # 3. Configuración para el componente Cloud (Registro del agente)
          - name: SOLACE_CLOUD_SSL_TRUST_STORE
            value: "/etc/ssl/certs/solace.crt"
          - name: SOLACE_CLOUD_SSL_VALIDATE_CERTIFICATE
            value: "false"
          - name: SOLACE_CLOUD_SSL_TRUST_STORE_FORMAT
            value: "PEM"
          # 4. Configuración genérica de transporte (Solace Messaging)
          - name: SOLACE_MESSAGING_TRANSPORT_SSL_TRUST_STORE_PATH
            value: "/etc/ssl/certs/solace.crt"
          - name: SOLACE_MESSAGING_TRANSPORT_SSL_TRUST_STORE_FORMAT
            value: "PEM"
          - name: SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_LOB_NON_CONTEXTUAL_CREATION
            value: "true"
        volumeMounts:
          - name: ema-config-volume
            mountPath: /config/ema.yml
            subPath: ema.yml
          - name: cert-volume
            mountPath: /etc/ssl/certs/solace.crt
            subPath: solace.crt
        resources:
          requests:
            cpu: 800m
            memory: 2512Mi
          limits:
            cpu: 800m
            memory: 2512Mi
      volumes:
        - name: ema-config-volume
          configMap:
            name: ema-config
        - name: cert-volume
          configMap:
            name: solace-agent-certs

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: solace
  labels:
    app: solace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solace
  template:
    metadata:
      labels:
        app: solace
    spec:
      containers:
      - name: solace
        image: solace/solace-pubsub-standard:10.25.13
        resources:
          requests:
            cpu: 3000m  # Adjust CPU request if needed
            memory: 6.0Gi  # Increase memory request to 2.5 GiB (or slightly higher)
          limits:
            cpu: 3000m  # Adjust CPU limit if needed
            memory: 6.0Gi
        volumeMounts:
           - mountPath: /dev/shm
             name: dshm
        ports:
        - containerPort: 8008
          protocol: TCP
        - containerPort: 1443
          protocol: TCP
        - containerPort: 1943
          protocol: TCP
        - containerPort: 1883
          protocol: TCP
        - containerPort: 5671
          protocol: TCP
        - containerPort: 5672
          protocol: TCP
        - containerPort: 8000
          protocol: TCP
        - containerPort: 8443
          protocol: TCP
        - containerPort: 8883
          protocol: TCP
        - containerPort: 8080
          protocol: TCP
        - containerPort: 9000
          protocol: TCP
        - containerPort: 9443
          protocol: TCP
        - containerPort: 55555
          protocol: TCP
        - containerPort: 55554
          protocol: TCP
        - containerPort: 55003
          protocol: TCP
        - containerPort: 55443
          protocol: TCP
        - containerPort: 2222
          protocol: TCP
        env:
          - name: username_admin_globalaccesslevel
            value: "admin"
          - name: username_admin_password
            value: "admin"
          - name: system_scaling_maxconnectioncount
            value: "1000"
          - name: storage_maxspoolusage
            value: "10000"
          - name: system_scaling_maxkafkabridgecount
            value: "10"
          # - name: system_scaling_maxkafkabrokerconnectioncount
          #   value: "10"
          - name: system_scaling_maxbridgecount
            value: "25"  
          - name: messagespool_maxspoolusage
            value: "15000"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: ema-config-volume
          configMap:
            name: ema-config
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "solace"
  namespace: solace
spec:
  ports:
  - name: smf
    port: 55555
    protocol: TCP
    targetPort: 55555
  - name: "web-http"
    port: 8008
    protocol: "TCP"
    targetPort: 8008
  - name: "web-tls"
    port: 1443
    protocol: "TCP"
    targetPort: 1443
  - name: "semp-manager"
    port: 8080
    protocol: "TCP"
    targetPort: 8080
  - name: "rest-vpn"
    port: 9000
    protocol: "TCP"
    targetPort: 9000
  selector:
    app: "solace"
  type: "ClusterIP"     
 
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-karavan
  namespace: solace
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: karavan
